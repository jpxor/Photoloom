<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Photo Gallery</title>
    <meta name="description" content="">
    
    <link rel="stylesheet" href="/css/style.css">
    
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="/" class="site-logo">My Photo Gallery</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/albums">Albums</a></li>
                <li><a href="/categories">Categories</a></li>
                <li><a href="/colors">Colors</a></li>
                <li><a href="/tags">Tags</a></li>
            </ul>
        </nav>
    </header>

    <main class="site-main">
        
<section class="page-header">
    <h1>Albums</h1>
</section>

<section class="albums-grid">
    <div class="grid">
        
        <a href="https://example.com/albums/san-salvador-bahamas/" class="album-card">
            
            <div class="album-cover">
                
                
                    
                    <img src="/photos/San%20Salvador%20Bahamas/DSCN0523_hu_bdcac655a1e41c00.webp" alt="Albums">
                
            </div>
            
            <div class="album-info">
                <h3>San Salvador Bahamas</h3>
                
                
                <span class="photo-count">0 photos</span>
            </div>
        </a>
        
        <a href="https://example.com/albums/winter-2025-2026/" class="album-card">
            
            <div class="album-cover">
                
                
                    
                    <img src="/photos/Winter%202025-2026/DSCN0183_hu_598c2e74cc306a01.webp" alt="Albums">
                
            </div>
            
            <div class="album-info">
                <h3>Winter 2025-2026</h3>
                
                
                <span class="photo-count">0 photos</span>
            </div>
        </a>
        
    </div>
</section>

    </main>

    <footer class="site-footer">
        <p>© Josh Simonot. All rights reserved.</p>
    </footer>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-image" src="" alt="">
        <div class="lightbox-info"></div>
        <a class="lightbox-prev">&#10094;</a>
        <a class="lightbox-next">&#10095;</a>
    </div>

    <script src="/js/main.js"></script>
    
</body>
</html>
