<section class="page-header">
    <div>
        <h1>Umbrellas</h1>
        <p>2 photos</p>
    </div>
    <button class="slideshow-btn" data-taxonomy="tag" data-term="umbrellas" title="View as slideshow">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>

</section>



<section class="photo-grid" data-taxonomy="tag" data-term="umbrellas">

                <img src="/photos/San%20Salvador%20Bahamas/DSCN0600_hu_e8377fe20563becb.webp" data-full-src="/photos/San%20Salvador%20Bahamas/DSCN0600_hu_60069f835a046d66.webp" alt="/photos/San Salvador Bahamas/DSCN0600.JPG" width="400" height="300">
